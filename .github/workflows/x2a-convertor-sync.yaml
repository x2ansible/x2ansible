name: x2a-convertor-sync

on:
  workflow_dispatch:

  push:
    branches:
      - test

permissions:
  contents: write
  pull-requests: write

jobs:
  x2a-convertor-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout x2ansible
        uses: actions/checkout@v4

      - name: Checkout x2a-convertor
        uses: actions/checkout@v4
        with:
          repository: x2ansible/x2a-convertor
          path: x2a-convertor

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install
        working-directory: x2a-convertor

      - name: Install dependencies
        run: uv sync
        working-directory: x2a-convertor

      - name: Generate docs
        run: make generate-docs
        working-directory: x2a-convertor

      - name: Copy generated docs
        run: |
          cd x2a-convertor
          changed_docs=$(git diff --name-only -- docs/)
          cd ..
          for file in $changed_docs; do
            mkdir -p "$(dirname "$file")"
            cp "x2a-convertor/$file" "$file"
          done
          ls -lah


      - name: Check for changes
        id: changes
        run: |
          git add docs/
          git status
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # - name: Create pull request
