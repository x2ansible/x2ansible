name: Deploy Documentation

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ./docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build
        working-directory: ./docs
        env:
          JEKYLL_ENV: production

      - name: Build without baseurl for link checking
        run: bundle exec jekyll build --baseurl ''
        working-directory: ./docs

      - name: Check links
        run: |
          docker run --rm -v $(pwd)/docs/_site:/src \
            klakegg/html-proofer:3.19.2 \
            --allow-hash-href \
            --empty-alt-ignore \
            --disable-external

      - name: Rebuild with baseurl for deployment
        run: bundle exec jekyll build
        working-directory: ./docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
